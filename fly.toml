# Fly.io configuration for hr-assistant
# Single-instance deployment (in-memory session store cannot scale horizontally)

app = "hr-assistant"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "3000"
  NODE_ENV = "production"
  # GEMINI_MODEL defaults to "gemini-2.5-flash" in lib/env.ts
  # To override: fly secrets set GEMINI_MODEL=gemini-2.5-flash-lite

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "30s"
    method       = "GET"
    path         = "/"
    protocol     = "http"
    timeout      = "5s"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
